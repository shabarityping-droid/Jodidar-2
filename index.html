
<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jodidar - विवाह संकेतस्थळ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>💖 Jodidar</h1>
    <nav>
        <a href="#home">मुख्यपृष्ठ</a>
        <a href="#about">आमच्याबद्दल</a>
        <a href="#register">नोंदणी</a>
        <a href="#contact">संपर्क</a>
    </nav>
</header>

<section id="home" class="hero">
    <h2>तुमच्या जीवनसाथीचा शोध येथे सुरू करा</h2>
    <p>विश्वासार्ह मराठी विवाह संकेतस्थळ</p>
    <a href="#register" class="btn">नोंदणी करा</a>
</section>

<section id="about">
    <h2>आमच्याबद्दल</h2>
    <p>Jodidar हे विश्वासार्ह विवाह संकेतस्थळ आहे.</p>
</section>

<section id="register">
    <h2>नोंदणी फॉर्म</h2>

    <form>
        <input type="text" placeholder="पूर्ण नाव" required><br><br>

        <input type="number" placeholder="वय" required><br><br>

        <select required>
            <option>लिंग निवडा</option>
            <option>पुरुष</option>
            <option>महिला</option>
        </select><br><br>

        <input type="file"><br><br>

        <button type="submit">नोंदणी करा</button>
    </form>
</section>

<section id="contact">
    <h2>संपर्क</h2>
    <p>ई-मेल: info@jodidar.com</p>
</section>

<footer>
    <p>© 2026 Jodidar. सर्व हक्क राखीव.</p>
</footer>

<script src="script.js"></script>

</body>
</html>
