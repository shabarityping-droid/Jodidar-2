<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matches</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    margin:0;
}
header{
    background:#e91e63;
    color:#fff;
    text-align:center;
    padding:15px;
}
.container{
    width:95%;
    margin:auto;
    padding:15px;
}
.card{
    background:#fff;
    border-radius:10px;
    padding:15px;
    margin-bottom:15px;
    box-shadow:0 2px 5px rgba(0,0,0,.2);
}
img{
    width:100%;
    max-width:250px;
    border-radius:8px;
}
button{
    background:#e91e63;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
}
</style>
</head>

<body>

<header>
<h2>❤️ माझे Matches</h2>
</header>

<div class="container">
<div id="matchesList">डेटा लोड होत आहे...</div>
</div>

<script type="module">

import { db } from "./firebase-config.js";

import {
ref,
get
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const matchesList=document.getElementById("matchesList");

try{

const snapshot=await get(ref(db,"users"));

if(!snapshot.exists()){
matchesList.innerHTML="<h3>कोणताही डेटा उपलब्ध नाही.</h3>";
}else{

matchesList.innerHTML="";

snapshot.forEach(child=>{

const user=child.val();

matchesList.innerHTML+=`
<div class="card">

<img src="${user.photo || 'https://via.placeholder.com/250'}">

<h3>${user.name || ''}</h3>

<p>वय : ${user.age || ''}</p>

<p>लिंग : ${user.gender || ''}</p>

<p>शहर : ${user.city || ''}</p>

</div>
`;

});

}

}catch(error){

matchesList.innerHTML="<h3>डेटा मिळाला नाही.</h3>";

console.log(error);

}

</script>

</body>
</html>
