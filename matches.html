<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jodidar - Matches</title>

<link rel="stylesheet" href="style.css">

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

header{
    background:#e91e63;
    color:#fff;
    padding:15px;
    text-align:center;
}

.container{
    width:95%;
    max-width:900px;
    margin:auto;
    padding:15px;
}

.card{
    background:#fff;
    border-radius:10px;
    padding:15px;
    margin-bottom:15px;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:10px;
}

.card h3{
    margin:10px 0;
}

.card p{
    margin:5px 0;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#e91e63;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#c2185b;
}

#matchesList{
    margin-top:20px;
}

</style>
</head>

<body>

<header>
<h2>❤️ माझे Matches</h2>
</header>

<div class="container">

<div id="matchesList">
Loading...
</div>

</div>

<script type="module">
import { db } from "./firebase-config.js";
import {
ref,
get
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
    const matchesList = document.getElementById("matchesList");

async function loadMatches(){

    matchesList.innerHTML = "Loading...";

    const snapshot = await get(ref(db,"users"));

    if(!snapshot.exists()){
        matchesList.innerHTML = "<h3>No Matches Found</h3>";
        return;
    }

    matchesList.innerHTML = "";

    snapshot.forEach((child)=>{

        const user = child.val();

        matchesList.innerHTML += `

        <div class="card">

            <img src="${user.photo || 'https://via.placeholder.com/400x250'}">

            <h3>${user.name || "No Name"}</h3>

            <p><b>वय:</b> ${user.age || "-"}</p>

            <p><b>लिंग:</b> ${user.gender || "-"}</p>

            <p><b>शहर:</b> ${user.city || "-"}</p>

            <button onclick="viewProfile('${child.key}')">
                View Profile
            </button>

        </div>

        `;

    });

}

window.viewProfile = function(id){
    localStorage.setItem("viewUserId", id);
    window.location.href = "profile.html";
};

loadMatches();
