<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            text-align:center;
            margin:40px;
        }
        input{
            width:80%;
            max-width:350px;
            padding:10px;
            font-size:16px;
        }
        .card{
            margin:20px auto;
            padding:15px;
            width:80%;
            max-width:400px;
            border:1px solid #ccc;
            border-radius:8px;
        }
    </style>
</head>
<body>

<h2>जोडीदार शोधा</h2>

<input type="text" id="searchBox" placeholder="नाव किंवा गाव लिहा..." onkeyup="searchUser()">

<div id="results">
    <div class="card">येथे शोधाचे निकाल दिसतील.</div>
</div>

<script>
function searchUser(){
    let input=document.getElementById("searchBox").value.toLowerCase();
    document.getElementById("results").innerHTML=
    "<div class='card'>शोध : "+input+"</div>";
}
</script>

</body>
</html>
