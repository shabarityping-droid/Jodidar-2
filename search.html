<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    text-align:center;
}

.container{
    width:90%;
    max-width:500px;
    margin:30px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px #ccc;
}

input{
    width:90%;
    padding:10px;
    margin:10px;
}

.card{
    border:1px solid #ccc;
    border-radius:8px;
    padding:10px;
    margin:10px 0;
    text-align:left;
}
</style>

</head>
<body>

<div class="container">

<h2>जोडीदार शोधा</h2>

<input
type="text"
id="search"
placeholder="नाव किंवा गाव टाका..."
onkeyup="searchUser()">

<div id="result"></div>

<br>

<button onclick="window.location.href='Home.html'">
होम
</button>

</div>

<script>

function searchUser(){

let text=document.getElementById("search").value.toLowerCase();

let users=JSON.parse(localStorage.getItem("users")) || [];

let html="";

users.forEach(function(user){

if(
user.name.toLowerCase().includes(text) ||
user.village.toLowerCase().includes(text)
){

html += `
<div class="card">
<b>नाव:</b> ${user.name}<br>
<b>मोबाईल:</b> ${user.mobile}<br>
<b>गाव:</b> ${user.village}
</div>
`;

}

});

if(html==""){
html="<p>कोणतीही नोंद सापडली नाही.</p>";
}

document.getElementById("result").innerHTML=html;

}

searchUser();

</script>

</body>
</html>
