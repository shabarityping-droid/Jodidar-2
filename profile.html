
<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>माझे प्रोफाइल - Jodidar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Jodidar</h1>
</header>

<div class="container">
    <h2>माझे प्रोफाइल</h2>

    <form>
        <label>पूर्ण नाव</label>
        <input type="text" placeholder="तुमचे नाव">

        <label>वय</label>
        <input type="number" placeholder="वय">

        <label>लिंग</label>
        <select>
            <option>पुरुष</option>
            <option>महिला</option>
        </select>

        <label>शिक्षण</label>
        <input type="text" placeholder="शिक्षण">

        <label>व्यवसाय</label>
        <input type="text" placeholder="व्यवसाय">

        <label>पत्ता</label>
        <textarea placeholder="पूर्ण पत्ता"></textarea>

        <button type="submit">प्रोफाइल जतन करा</button>
    </form>

    <br>

    <a href="index.html">
        <button>मुख्य पान</button>
    </a>
</div>

</body>
</html>
