
<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Jodidar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>❤️ Jodidar</h1>
</header>

<main>
    <h2>माझे प्रोफाइल</h2>

    <p>Jodidar मध्ये तुमचे स्वागत आहे.</p>

    <h3>प्रोफाइल माहिती</h3>

    <p><strong>नाव:</strong> User</p>
    <p><strong>ईमेल:</strong> user@example.com</p>

    <br>

    <button onclick="logout()">Logout</button>
</main>

<script>
if (localStorage.getItem("loggedIn") !== "true") {
    window.location.href = "login.html";
}

function logout() {
    localStorage.removeItem("loggedIn");
    alert("तुम्ही यशस्वीरित्या Logout झाला आहात.");
    window.location.href = "login.html";
}
</script>

</body>
</html>
