<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jodidar - Profile</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>माझे प्रोफाइल</h1>

    <div class="profile-card">

        <img
            id="profilePhoto"
            src="https://via.placeholder.com/150x180?text=Photo"
            alt="Profile Photo">

        <p><strong>नाव:</strong> <span id="name"></span></p>

        <p><strong>वय:</strong> <span id="age"></span></p>

        <p><strong>लिंग:</strong> <span id="gender"></span></p>

        <p><strong>मोबाईल:</strong> <span id="mobile"></span></p>

        <p><strong>गाव:</strong> <span id="village"></span></p>

        <p><strong>तालुका:</strong> <span id="taluka"></span></p>

        <p><strong>जिल्हा:</strong> <span id="district"></span></p>

        <p><strong>शिक्षण:</strong> <span id="education"></span></p>

        <p><strong>व्यवसाय:</strong> <span id="occupation"></span></p>

        <p><strong>स्वतःबद्दल:</strong></p>

        <p id="about"></p>

    </div>

</div>
<script type="module">

import { db } from "./firebase-config.js";

import {
  ref,
  get
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const profileId = localStorage.getItem("profileId");

if (!profileId) {
    alert("प्रोफाइल सापडले नाही.");
    window.location.href = "register.html";
}

const userRef = ref(db, "users/" + profileId);

get(userRef).then((snapshot) => {

    if (snapshot.exists()) {

        const user = snapshot.val();

        document.getElementById("profilePhoto").src = user.photo || "";
        document.getElementById("name").textContent = user.name || "";
        document.getElementById("age").textContent = user.age || "";
        document.getElementById("gender").textContent = user.gender || "";
        document.getElementById("mobile").textContent = user.mobile || "";
        document.getElementById("village").textContent = user.village || "";
        document.getElementById("taluka").textContent = user.taluka || "";
        document.getElementById("district").textContent = user.district || "";
        document.getElementById("education").textContent = user.education || "";
        document.getElementById("occupation").textContent = user.occupation || "";
        document.getElementById("about").textContent = user.about || "";

    } else {

        alert("प्रोफाइल माहिती उपलब्ध नाही.");

    }

}).catch((error) => {

    console.error(error);
    alert("डेटा लोड करताना त्रुटी आली.");

});

</script>

</body>
</html>
