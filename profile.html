<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>माझे प्रोफाइल</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}
.container{
    max-width:500px;
    margin:20px auto;
    background:#fff;
    border-radius:10px;
    padding:20px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}
img{
    width:150px;
    height:150px;
    border-radius:50%;
    object-fit:cover;
    display:block;
    margin:auto;
    border:3px solid #ff4081;
}
h2{
    text-align:center;
}
.item{
    margin:10px 0;
    font-size:18px;
}
strong{
    color:#ff4081;
}
</style>

</head>
<body>

<div class="container">

<img id="photo" src="" alt="Photo">

<h2 id="name">Loading...</h2>

<div class="item"><strong>वय :</strong> <span id="age"></span></div>

<div class="item"><strong>लिंग :</strong> <span id="gender"></span></div>

<div class="item"><strong>मोबाईल :</strong> <span id="mobile"></span></div>

<div class="item"><strong>गाव :</strong> <span id="village"></span></div>

<div class="item"><strong>तालुका :</strong> <span id="taluka"></span></div>

<div class="item"><strong>जिल्हा :</strong> <span id="district"></span></div>

<div class="item"><strong>शिक्षण :</strong> <span id="education"></span></div>

<div class="item"><strong>व्यवसाय :</strong> <span id="occupation"></span></div>

<div class="item">
<strong>माहिती :</strong>
<p id="about"></p>
</div>

</div>

<script type="module" src="App.js"></script>

</body>
</html>
