<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>माझे प्रोफाइल - Jodidar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>माझे प्रोफाइल</h2>

<form id="profileForm">

  <label>पूर्ण नाव</label><br>
  <input type="text" id="name" required><br><br>

  <label>मोबाईल नंबर</label><br>
  <input type="text" id="mobile" required><br><br>

  <label>वय</label><br>
  <input type="number" id="age" required><br><br>

  <label>जिल्हा</label><br>
  <input type="text" id="district" required><br><br>

  <label>शिक्षण</label><br>
  <input type="text" id="education" required><br><br>

  <label>व्यवसाय</label><br>
  <input type="text" id="occupation" required><br><br>

  <button type="submit">Profile Save</button>

</form>

<br>

<button onclick="location.href='home.html'">
Home
</button>

<script type="module">

import {
  db,
  auth
} from "./firebase.js";

import {
  doc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

document.getElementById("profileForm").addEventListener("submit", async (e) => {

  e.preventDefault();

  const user = auth.currentUser;

  if (!user) {
    alert("कृपया प्रथम Login करा.");
    return;
  }

  try {

    await setDoc(doc(db, "profiles", user.uid), {

      name: document.getElementById("name").value,
      mobile: document.getElementById("mobile").value,
      age: document.getElementById("age").value,
      district: document.getElementById("district").value,
      education: document.getElementById("education").value,
      occupation: document.getElementById("occupation").value,
      email: user.email

    });

    alert("प्रोफाइल यशस्वीरित्या सेव्ह झाले.");

  } catch (error) {

    alert(error.message);

  }

});

</script>

</body>
</html>
