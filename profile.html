<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>माझे प्रोफाइल</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container">

<h2>माझे प्रोफाइल</h2>

<form id="profileForm">

<input type="text" id="name" placeholder="पूर्ण नाव" required>

<br><br>

<input type="number" id="age" placeholder="वय" required>

<br><br>

<select id="gender" required>
<option value="">लिंग निवडा</option>
<option value="Male">पुरुष</option>
<option value="Female">महिला</option>
</select>

<br><br>

<input type="text" id="city" placeholder="गाव / शहर" required>

<br><br>

<input type="tel" id="mobile" placeholder="मोबाईल नंबर" required>

<br><br>

<label>फोटो १</label><br>
<input type="file" id="photo1" accept="image/*">

<br><br>

<label>फोटो २</label><br>
<input type="file" id="photo2" accept="image/*">

<br><br>

<label>फोटो ३</label><br>
<input type="file" id="photo3" accept="image/*">

<br><br>

<label>PDF अपलोड करा</label><br>
<input type="file" id="pdf" accept=".pdf">

<br><br>

<button type="submit">प्रोफाइल सेव्ह करा</button>

</form>

<br>

<a href="home.html">
<button type="button">Home</button>
</a>

</div>

<script type="module" src="profile.js"></script>

</body>
</html>
