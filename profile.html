<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f2f2f2;
    margin:0;
    padding:20px;
}
.container{
    max-width:450px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}
h2{
    text-align:center;
}
input{
    width:100%;
    padding:10px;
    margin:8px 0;
    box-sizing:border-box;
}
button{
    width:100%;
    padding:12px;
    background:#2196F3;
    color:#fff;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
button:hover{
    background:#1976D2;
}
</style>
</head>

<body>

<div class="container">

<h2>माझे प्रोफाइल</h2>

<input type="text" id="name" placeholder="पूर्ण नाव">

<input type="tel" id="mobile" placeholder="मोबाईल नंबर">

<label>फोटो 1</label>
<input type="file" id="photo1" accept="image/*">

<label>फोटो 2</label>
<input type="file" id="photo2" accept="image/*">

<label>फोटो 3</label>
<input type="file" id="photo3" accept="image/*">

<label>PDF अपलोड</label>
<input type="file" id="pdf" accept=".pdf">

<button onclick="saveProfile()">प्रोफाइल सेव्ह करा</button>

</div>

<script>
function saveProfile(){

const name=document.getElementById("name").value;
const mobile=document.getElementById("mobile").value;

if(name=="" || mobile==""){
alert("नाव व मोबाईल नंबर भरा.");
return;
}

localStorage.setItem("name",name);
localStorage.setItem("mobile",mobile);

alert("प्रोफाइल सेव्ह झाले.");

window.location.href="home.html";

}
</script>

</body>
</html>
