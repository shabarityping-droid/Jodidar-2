<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>माझे प्रोफाइल - Jodidar</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

.container{
    max-width:500px;
    margin:20px auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.15);
}

h2{
    text-align:center;
}

img{
    width:150px;
    height:150px;
    border-radius:50%;
    object-fit:cover;
    display:block;
    margin:15px auto;
    border:3px solid #2196F3;
}

.info{
    margin:12px 0;
    font-size:17px;
}

span{
    font-weight:bold;
}

button{
    width:100%;
    padding:12px;
    margin-top:20px;
    border:none;
    border-radius:6px;
    background:#2196F3;
    color:#fff;
    font-size:16px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>माझे प्रोफाइल</h2>

<img id="photo" src="user.png" alt="Profile">

<div class="info">नाव : <span id="name"></span></div>

<div class="info">मोबाईल : <span id="mobile"></span></div>

<div class="info">वय : <span id="age"></span></div>

<div class="info">लिंग : <span id="gender"></span></div>

<div class="info">जिल्हा : <span id="district"></span></div>

<div class="info">वैवाहिक स्थिती : <span id="maritalStatus"></span></div>

<div class="info">शिक्षण : <span id="education"></span></div>

<div class="info">व्यवसाय : <span id="occupation"></span></div>

<button onclick="window.location='edit-profile.html'">
प्रोफाइल संपादित करा
</button>

</div>

<script type="module" src="profile.js"></script>

</body>
</html>
