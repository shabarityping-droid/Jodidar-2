<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>माझे प्रोफाइल - Jodidar</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h2>माझे प्रोफाइल</h2>

<form id="profileForm">

  <label>पूर्ण नाव</label><br>
  <input type="text" id="name" required><br><br>

  <label>मोबाईल नंबर</label><br>
  <input type="text" id="mobile" required><br><br>

  <label>वय</label><br>
  <input type="number" id="age"><br><br>

  <label>जिल्हा</label><br>
  <input type="text" id="district"><br><br>

  <label>शिक्षण</label><br>
  <input type="text" id="education"><br><br>

  <label>व्यवसाय</label><br>
  <input type="text" id="occupation"><br><br>

  <button type="submit">Save Profile</button>

</form>

<br>

<button onclick="location.href='index.html'">
Home
</button>

<script src="firebase.js"></script>

<script>
document.getElementById("profileForm").addEventListener("submit", function(e){

    e.preventDefault();

    const profile = {
        name: document.getElementById("name").value,
        mobile: document.getElementById("mobile").value,
        age: document.getElementById("age").value,
        district: document.getElementById("district").value,
        education: document.getElementById("education").value,
        occupation: document.getElementById("occupation").value
    };

    localStorage.setItem("profile", JSON.stringify(profile));

    alert("प्रोफाइल यशस्वीरित्या सेव्ह झाले.");

});
</script>

</body>
</html>
