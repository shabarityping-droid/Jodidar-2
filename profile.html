<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jodidar - Profile</title>

<link rel="stylesheet" href="style.css">

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f2f2f2;
}

.container{
    max-width:500px;
    margin:20px auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.15);
}

h2{
    text-align:center;
    color:#e91e63;
}

.profile-photo{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    display:block;
    margin:15px auto;
    border:3px solid #e91e63;
}

input, select, textarea{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:1px solid #ccc;
    border-radius:6px;
    box-sizing:border-box;
}

textarea{
    resize:none;
    height:80px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#e91e63;
    color:#fff;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#c2185b;
}
</style>

</head>
<body>

<div class="container">

<h2>माझे प्रोफाइल</h2>

<img src="https://via.placeholder.com/120" id="photo" class="profile-photo">

<input type="file" id="imageInput" accept="image/*">

<input type="text" id="name" placeholder="पूर्ण नाव">

<input type="number" id="age" placeholder="वय">

<select id="gender">
<option value="">लिंग निवडा</option>
<option>पुरुष</option>
<option>महिला</option>
</select>

<input type="text" id="city" placeholder="शहर">

<input type="text" id="education" placeholder="शिक्षण">

<input type="text" id="occupation" placeholder="व्यवसाय">

<textarea id="about" placeholder="स्वतःबद्दल"></textarea>

<button onclick="saveProfile()">प्रोफाइल सेव्ह करा</button>

</div>

<script>
const imageInput = document.getElementById("imageInput");
const photo = document.getElementById("photo");

imageInput.addEventListener("change",function(){

const file=this.files[0];

if(file){
photo.src=URL.createObjectURL(file);
}
});

function saveProfile(){

const profile={
name:document.getElementById("name").value,
age:document.getElementById("age").value,
gender:document.getElementById("gender").value,
city:document.getElementById("city").value,
education:document.getElementById("education").value,
occupation:document.getElementById("occupation").value,
about:document.getElementById("about").value,
photo:photo.src
};

localStorage.setItem("profile",JSON.stringify(profile));

alert("प्रोफाइल यशस्वीरित्या सेव्ह झाले.");
}

window.onload=function(){

const data=JSON.parse(localStorage.getItem("profile"));

if(data){

document.getElementById("name").value=data.name||"";
document.getElementById("age").value=data.age||"";
document.getElementById("gender").value=data.gender||"";
document.getElementById("city").value=data.city||"";
document.getElementById("education").value=data.education||"";
document.getElementById("occupation").value=data.occupation||"";
document.getElementById("about").value=data.about||"";

if(data.photo){
photo.src=data.photo;
}

}

};
</script>

</body>
</html>
