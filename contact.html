
<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>संपर्क - Jodidar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Jodidar</h1>
</header>

<div class="container">
    <h2>संपर्क करा</h2>

    <form>
        <label>पूर्ण नाव</label>
        <input type="text" placeholder="तुमचे नाव" required>

        <label>मोबाईल नंबर</label>
        <input type="tel" placeholder="मोबाईल नंबर" required>

        <label>ई-मेल</label>
        <input type="email" placeholder="ई-मेल">

        <label>संदेश</label>
        <textarea rows="5" placeholder="तुमचा संदेश येथे लिहा..." required></textarea>

        <button type="submit">संदेश पाठवा</button>
    </form>

    <br>

    <a href="index.html">
        <button>मुख्य पान</button>
    </a>
</div>

</body>
</html>
