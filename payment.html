
<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      text-align:center;
      background:#f5f5f5;
      margin:0;
      padding:20px;
    }

    .box{
      max-width:400px;
      margin:auto;
      background:#fff;
      padding:20px;
      border-radius:10px;
      box-shadow:0 0 10px #ccc;
    }

    img{
      width:100%;
      border-radius:10px;
    }

    button{
      width:100%;
      padding:15px;
      margin-top:20px;
      font-size:18px;
      background:green;
      color:white;
      border:none;
      border-radius:8px;
      cursor:pointer;
    }

    button:hover{
      background:darkgreen;
    }
  </style>
</head>

<body>

<div class="box">

<h2>Payment करा</h2>

<p>खालील QR Scanner स्कॅन करून Payment करा.</p>

<img src="images/payment-qr.jpg" alt="QR Scanner">

<br><br>

<button onclick="paymentDone()">
मी Payment केले
</button>

</div>

<script>

function paymentDone(){

localStorage.setItem("payment","done");

alert("Payment Successful");

window.location.href="home.html";

}

</script>

</body>
</html>
