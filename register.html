<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jodidar - नवीन नोंदणी</title>

    <link rel="stylesheet" href="style.css">

    <script type="module" src="firebase.js"></script>
    <script type="module" src="register.js"></script>
</head>

<body>

<div class="container">

    <h1>Jodidar - नवीन नोंदणी</h1>

    <form id="registerForm">

        <input
            type="text"
            id="name"
            placeholder="पूर्ण नाव"
            required
        >

        <input
            type="email"
            id="email"
            placeholder="ईमेल"
            required
        >

        <input
            type="tel"
            id="mobile"
            placeholder="मोबाईल नंबर"
            maxlength="10"
            required
        >

        <input
            type="password"
            id="password"
            placeholder="पासवर्ड"
            required
        >

        <button type="submit">
            Register
        </button>

    </form>

    <br>

    <p>
        आधीच खाते आहे?
        <a href="login.html">Login</a>
    </p>

    <br>

    <a href="index.html">🏠 Home</a>

</div>

</body>
</html>
