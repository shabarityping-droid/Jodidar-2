<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    text-align:center;
}
.container{
    width:320px;
    margin:40px auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px #ccc;
}
input{
    width:90%;
    padding:10px;
    margin:8px 0;
}
button{
    width:95%;
    padding:10px;
    background:green;
    color:white;
    border:none;
    cursor:pointer;
}
button:hover{
    background:darkgreen;
}
</style>
</head>

<body>

<div class="container">
<h2>नोंदणी</h2>

<input type="text" id="name" placeholder="पूर्ण नाव">
<input type="text" id="mobile" placeholder="मोबाईल नंबर">
<input type="text" id="village" placeholder="गाव">

<button onclick="register()">नोंदणी करा</button>

<p id="msg"></p>
</div>

<script>
function register(){

let name=document.getElementById("name").value;
let mobile=document.getElementById("mobile").value;
let village=document.getElementById("village").value;

if(name=="" || mobile=="" || village==""){
    document.getElementById("msg").innerHTML="सर्व माहिती भरा.";
    return;
}

let users=JSON.parse(localStorage.getItem("users")) || [];

users.push({
    name:name,
    mobile:mobile,
    village:village
});

localStorage.setItem("users",JSON.stringify(users));

document.getElementById("msg").innerHTML="नोंदणी यशस्वी!";

document.getElementById("name").value="";
document.getElementById("mobile").value="";
document.getElementById("village").value="";
}
</script>

</body>
</html>
