<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jodidar - Register</title>

<link rel="stylesheet" href="style.css">

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f2f2f2;
}

.container{
    width:90%;
    max-width:400px;
    margin:30px auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.15);
}

h2{
    text-align:center;
    color:#e91e63;
}

input,select,textarea{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:#e91e63;
    color:#fff;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#c2185b;
}
</style>
</head>

<body>

<div class="container">

<h2>नोंदणी करा</h2>

<form id="registerForm">

<input type="text" id="name" placeholder="पूर्ण नाव" required>

<input type="tel" id="mobile" placeholder="मोबाईल नंबर" maxlength="10" required>

<input type="number" id="age" placeholder="वय" required>

<select id="gender" required>
<option value="">लिंग निवडा</option>
<option>पुरुष</option>
<option>महिला</option>
</select>

<input type="text" id="city" placeholder="शहर" required>

<textarea id="about" placeholder="स्वतःबद्दल"></textarea>

<button type="submit">नोंदणी करा</button>

</form>

</div>

<script type="module">

import { db } from "./firebase-config.js";
import { ref, push } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

document.getElementById("registerForm").addEventListener("submit",function(e){

e.preventDefault();

const data={
name:document.getElementById("name").value,
mobile:document.getElementById("mobile").value,
age:document.getElementById("age").value,
gender:document.getElementById("gender").value,
city:document.getElementById("city").value,
about:document.getElementById("about").value,
createdAt:Date.now()
};

push(ref(db,"users"),data)
.then(()=>{
alert("नोंदणी यशस्वी!");
window.location.href="login.html";
})
.catch((err)=>{
alert(err.message);
});

});

</script>

</body>
</html>
