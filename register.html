<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jodidar - Register</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h2>नोंदणी (Register)</h2>

    <form id="registerForm">
      <input
        type="text"
        id="name"
        placeholder="पूर्ण नाव"
        required
      >

      <input
        type="email"
        id="email"
        placeholder="ईमेल"
        required
      >

      <input
        type="password"
        id="password"
        placeholder="पासवर्ड"
        required
      >

      <button type="submit">Register</button>
    </form>

    <p id="message"></p>

    <p>
      आधीच खाते आहे?
      <a href="login.html">Login</a>
    </p>
  </div>

  <script type="module" src="register.js"></script>

</body>
</html>
