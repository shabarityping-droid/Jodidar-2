<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>नोंदणी</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>नवीन प्रोफाइल नोंदणी</h2>

    <form id="registerForm">

        <input type="text" id="name" placeholder="पूर्ण नाव" required>

        <input type="tel" id="mobile" placeholder="मोबाईल नंबर" maxlength="10" required>

        <input type="text" id="village" placeholder="गाव" required>

        <button type="submit">नोंदणी करा</button>

    </form>

    <br>

    <a href="login.html">आधीच खाते आहे? लॉगिन करा</a>

</div>

<script>
document.getElementById("registerForm").addEventListener("submit", function(e){
    e.preventDefault();

    const user = {
        name: document.getElementById("name").value,
        mobile: document.getElementById("mobile").value,
        village: document.getElementById("village").value
    };

    localStorage.setItem("user_" + user.mobile, JSON.stringify(user));

    alert("नोंदणी यशस्वी!");

    window.location.href = "login.html";
});
</script>

</body>
</html>
