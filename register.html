<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Jodidar</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#f5f5f5;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .container{
            width:95%;
            max-width:420px;
            background:#fff;
            padding:20px;
            border-radius:12px;
            box-shadow:0 0 10px rgba(0,0,0,.15);
        }

        h2{
            text-align:center;
            color:#d81b60;
            margin-bottom:20px;
        }

        input,select{
            width:100%;
            padding:12px;
            margin:8px 0;
            border:1px solid #ccc;
            border-radius:6px;
            font-size:16px;
        }

        img{
            width:120px;
            height:150px;
            object-fit:cover;
            border:1px solid #ccc;
            display:block;
            margin:10px auto;
            border-radius:6px;
        }

        button{
            width:100%;
            padding:12px;
            background:#d81b60;
            color:#fff;
            border:none;
            border-radius:6px;
            font-size:17px;
            cursor:pointer;
            margin-top:10px;
        }

        button:hover{
            background:#b0004f;
        }
    </style>
</head>

<body>

<div class="container">

<h2>Jodidar Registration</h2>

<img id="preview" src="https://via.placeholder.com/120x150?text=Photo">

<input type="file" id="photo" accept="image/*">

<input type="text" id="name" placeholder="पूर्ण नाव">

<input type="number" id="age" placeholder="वय">

<select id="gender">
    <option value="">लिंग निवडा</option>
    <option>पुरुष</option>
    <option>महिला</option>
</select>

<input type="text" id="mobile" placeholder="मोबाईल नंबर">

<input type="text" id="address" placeholder="पत्ता">

<button id="registerBtn">Register</button>

</div>

<script type="module" src="register.js"></script>

</body>
</html>
