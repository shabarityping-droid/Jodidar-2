<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jodidar - Register</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>Jodidar Registration</h1>

    <div class="photo-box">

        <img
            id="preview"
            src="https://via.placeholder.com/140x170?text=Photo"
            alt="Photo Preview">

        <br><br>

        <input
            type="file"
            id="photo"
            accept="image/*">

    </div>

    <label>पूर्ण नाव</label>
    <input
        type="text"
        id="name"
        placeholder="तुमचे पूर्ण नाव">

    <label>वय</label>
    <input
        type="number"
        id="age"
        placeholder="वय">

    <label>लिंग</label>
    <select id="gender">
        <option value="">निवडा</option>
        <option>पुरुष</option>
        <option>महिला</option>
    </select>

    <label>मोबाईल नंबर</label>
    <input
        type="tel"
        id="mobile"
        placeholder="मोबाईल नंबर">

    <label>गाव</label>
    <input
        type="text"
        id="village"
        placeholder="गाव">

    <label>तालुका</label>
    <input
        type="text"
        id="taluka"
        placeholder="तालुका">

    <label>जिल्हा</label>
    <input
        type="text"
        id="district"
        placeholder="जिल्हा">

    <label>शिक्षण</label>
    <input
        type="text"
        id="education"
        placeholder="शिक्षण">

    <label>व्यवसाय</label>
    <input
        type="text"
        id="occupation"
        placeholder="व्यवसाय">

    <label>स्वतःबद्दल</label>
    <textarea
        id="about"
        placeholder="थोडक्यात माहिती"></textarea>

    <button id="registerBtn">
        नोंदणी करा
    </button>

</div>
<script type="module">

import { db, storage } from "./firebase-config.js";

import {
    ref,
    uploadBytes,
    getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

import {
    ref as dbRef,
    set
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const photo = document.getElementById("photo");
const preview = document.getElementById("preview");

// Photo Preview
photo.addEventListener("change", () => {

    const file = photo.files[0];

    if(file){
        preview.src = URL.createObjectURL(file);
    }

});

// Register
document.getElementById("registerBtn").addEventListener("click", async () => {

    const file = photo.files[0];

    if(!file){
        alert("कृपया फोटो निवडा.");
        return;
    }

    const id = Date.now().toString();

    const storageRef = ref(storage, "photos/" + id);

    await uploadBytes(storageRef, file);

    const photoURL = await getDownloadURL(storageRef);

    const userData = {

        name: document.getElementById("name").value,
        age: document.getElementById("age").value,
        gender: document.getElementById("gender").value,
        mobile: document.getElementById("mobile").value,
        village: document.getElementById("village").value,
        taluka: document.getElementById("taluka").value,
        district: document.getElementById("district").value,
        education: document.getElementById("education").value,
        occupation: document.getElementById("occupation").value,
        about: document.getElementById("about").value,
        photo: photoURL

    };

    await set(dbRef(db, "users/" + id), userData);

    localStorage.setItem("profileId", id);

    alert("नोंदणी यशस्वी झाली.");

    window.location.href = "profile.html";

});

</script>

</body>
</html>
