<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>नोंदणी</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:20px;
}
.container{
    width:90%;
    max-width:400px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}
input,select,textarea{
    width:100%;
    padding:10px;
    margin:8px 0;
    box-sizing:border-box;
}
img{
    width:120px;
    height:150px;
    object-fit:cover;
    border:1px solid #ccc;
    display:none;
    margin:10px auto;
}
button{
    width:100%;
    padding:12px;
    background:#e91e63;
    color:#fff;
    border:none;
    border-radius:5px;
    font-size:16px;
}
</style>
</head>

<body>

<div class="container">

<h2>नोंदणी</h2>

<form id="registerForm">

<input type="text" id="name" placeholder="पूर्ण नाव" required>

<input type="tel" id="mobile" maxlength="10" placeholder="मोबाईल नंबर" required>

<input type="number" id="age" placeholder="वय" required>

<select id="gender" required>
<option value="">लिंग निवडा</option>
<option>पुरुष</option>
<option>महिला</option>
</select>

<input type="text" id="city" placeholder="शहर" required>

<textarea id="about" placeholder="स्वतःबद्दल"></textarea>

<label>पासपोर्ट साईज फोटो</label>
<input type="file" id="photo" accept="image/*">

<img id="preview">

<button type="submit">नोंदणी करा</button>

</form>

</div>

<script>
const photo=document.getElementById("photo");
const preview=document.getElementById("preview");

photo.addEventListener("change",function(){
const file=this.files[0];
if(file){
preview.src=URL.createObjectURL(file);
preview.style.display="block";
}
});
</script>

</body>
</html>
