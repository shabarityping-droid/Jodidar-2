<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>नोंदणी</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h2>नवीन नोंदणी</h2>

<form id="registerForm">

<input type="text" id="name" placeholder="पूर्ण नाव" required>

<br><br>

<input type="number" id="age" placeholder="वय" required>

<br><br>

<input type="text" id="city" placeholder="गाव / शहर" required>

<br><br>

<input type="email" id="email" placeholder="ई-मेल" required>

<br><br>

<input type="password" id="password" placeholder="पासवर्ड" required>

<br><br>

<button type="submit">नोंदणी करा</button>

</form>

<br>

<p>
आधीच खाते आहे?
<a href="login.html">लॉगिन करा</a>
</p>

</div>

<script type="module" src="register.js"></script>

</body>
</html>
