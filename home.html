<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jodidar - Home</title>

<link rel="stylesheet" href="style.css">

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

header{
    background:#e91e63;
    color:#fff;
    text-align:center;
    padding:15px;
    font-size:24px;
    font-weight:bold;
}

.container{
    padding:20px;
}

.card{
    background:#fff;
    border-radius:10px;
    padding:15px;
    margin-bottom:15px;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
}

.card img{
    width:100%;
    border-radius:10px;
}

.card h3{
    margin-top:10px;
}

button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#e91e63;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.bottom-nav{
    position:fixed;
    bottom:0;
    width:100%;
    background:#fff;
    display:flex;
    justify-content:space-around;
    padding:10px 0;
    box-shadow:0 -2px 5px rgba(0,0,0,.2);
}

.bottom-nav a{
    text-decoration:none;
    color:#e91e63;
    font-weight:bold;
}
</style>

</head>
<body>

<header>
Jodidar
</header>

<div class="container">

<div class="card">
<img src="https://via.placeholder.com/400x250" alt="Profile">
<h3>स्वागत आहे!</h3>
<p>तुमचा जोडीदार शोध सुरू करा.</p>
<button onclick="location.href='profile.html'">
प्रोफाइल पाहा
</button>
</div>

<div class="card">
<h3>नवीन सदस्य</h3>
<p>आजचे नवीन प्रोफाइल पाहण्यासाठी खाली क्लिक करा.</p>
<button onclick="alert('लवकरच उपलब्ध')">
पाहा
</button>
</div>

</div>

<div class="bottom-nav">
<a href="home.html">Home</a>
<a href="profile.html">Profile</a>
<a href="admin.html">Admin</a>
</div>

</body>
</html>
