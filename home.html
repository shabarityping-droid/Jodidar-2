<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jodidar - Home</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
}

header{
    background:#2196F3;
    color:#fff;
    text-align:center;
    padding:15px;
    font-size:24px;
    font-weight:bold;
}

.container{
    max-width:500px;
    margin:20px auto;
    padding:15px;
}

.card{
    background:#fff;
    border-radius:10px;
    padding:15px;
    margin-bottom:15px;
    box-shadow:0 2px 8px rgba(0,0,0,0.15);
}

.card h3{
    margin-bottom:10px;
}

.card p{
    margin:5px 0;
}

.btn{
    display:block;
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#2196F3;
    color:#fff;
    text-decoration:none;
    text-align:center;
    border-radius:6px;
}

.logout{
    background:#e53935;
}

nav{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:#fff;
    display:flex;
    justify-content:space-around;
    padding:10px 0;
    box-shadow:0 -2px 8px rgba(0,0,0,.2);
}

nav a{
    text-decoration:none;
    color:#2196F3;
    font-weight:bold;
}
</style>
</head>

<body>

<header>
Jodidar
</header>

<div class="container">

<div class="card">
<h3>स्वागत आहे</h3>

<p>Jodidar मध्ये आपले स्वागत आहे.</p>

<a href="profile.html" class="btn">
माझे प्रोफाइल
</a>

<a href="search.html" class="btn">
जोडीदार शोधा
</a>

<a href="edit-profile.html" class="btn">
प्रोफाइल संपादित करा
</a>

<a href="#" class="btn logout" id="logoutBtn">
लॉगआउट
</a>

</div>

</div>

<nav>
<a href="home.html">Home</a>
<a href="search.html">Search</a>
<a href="profile.html">Profile</a>
</nav>

<script>
const mobile = localStorage.getItem("mobile");

if(!mobile){
    window.location.href = "login.html";
}

document.getElementById("logoutBtn").addEventListener("click",function(e){
    e.preventDefault();

    localStorage.removeItem("mobile");

    alert("लॉगआउट यशस्वी.");

    window.location.href="login.html";
});
</script>

</body>
</html>
