<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    background:#f2f2f2;
}

.container{
    width:350px;
    margin:40px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px #ccc;
}

button{
    width:90%;
    padding:10px;
    margin:10px;
    border:none;
    border-radius:5px;
    background:green;
    color:white;
    font-size:16px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>जोडीदार प्रोजेक्ट</h2>

<h3 id="welcome"></h3>

<button onclick="window.location.href='Search.html'">
जोडीदार शोधा
</button>

<button onclick="logout()">
लॉगआउट
</button>

</div>

<script>
let user = JSON.parse(localStorage.getItem("currentUser"));

if(user){
    document.getElementById("welcome").innerHTML =
    "स्वागत आहे, " + user.name;
}else{
    window.location.href="Login.html";
}

function logout(){
    localStorage.removeItem("currentUser");
    window.location.href="Login.html";
}
</script>

</body>
</html>
