<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jodidar - Home</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>❤️ जोडीदार</h1>

    <h3>आपले स्वागत आहे</h3>

    <p>
        User ID :
        <span id="userId"></span>
    </p>

    <hr>

    <button onclick="window.location.href='profile.html'">
        👤 माझे प्रोफाइल
    </button>

    <br><br>

    <button onclick="window.location.href='search.html'">
        🔍 जोडीदार शोधा
    </button>

    <br><br>

    <button onclick="window.location.href='matches.html'">
        ❤️ जुळलेल्या प्रोफाइल
    </button>

    <br><br>

    <button onclick="window.location.href='payment.html'">
        💳 पेमेंट
    </button>

    <br><br>

    <button onclick="logout()">
        🚪 Logout
    </button>

</div>

<script>
const userId = localStorage.getItem("userId");

if (!userId) {
    window.location.href = "login.html";
}

document.getElementById("userId").textContent = userId;

function logout() {
    localStorage.removeItem("userId");
    window.location.href = "login.html";
}
</script>

</body>
</html>
