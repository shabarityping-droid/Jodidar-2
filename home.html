<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jodidar - Home</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

header{
    background:#e91e63;
    color:#fff;
    padding:15px;
    text-align:center;
    position:relative;
}

#logoutBtn{
    position:absolute;
    top:10px;
    right:10px;
    background:#fff;
    color:#e91e63;
    border:none;
    padding:8px 15px;
    border-radius:5px;
    cursor:pointer;
    font-weight:bold;
}

.container{
    padding:20px;
    text-align:center;
}
</style>
</head>

<body>

<header>
    <h2>जोडीदार शोधा</h2>
    <button id="logoutBtn">Logout</button>
</header>

<div class="container">
    <h3>स्वागत आहे!</h3>
    <p>तुम्ही यशस्वीरित्या Login केले आहे.</p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig = {
  // तुमचा Firebase Config येथे ठेवा
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.getElementById("logoutBtn").addEventListener("click", () => {
    signOut(auth).then(() => {
        window.location.href = "login.html";
    }).catch((error) => {
        alert(error.message);
    });
});
</script>

</body>
</html>
