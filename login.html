<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jodidar - Login</title>

<link rel="stylesheet" href="style.css">

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f2f2f2;
}
.container{
    width:90%;
    max-width:350px;
    margin:60px auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}
h2{
    text-align:center;
}
input{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}
button{
    width:100%;
    padding:12px;
    margin-top:20px;
    background:#e91e63;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}
button:hover{
    background:#d81b60;
}
</style>

</head>

<body>

<div class="container">

<h2>Login</h2>

<input
type="tel"
id="mobile"
placeholder="मोबाईल नंबर टाका"
maxlength="10">

<button onclick="loginUser()">
पुढे जा
</button>

</div>

<script>

function loginUser(){

let mobile=document.getElementById("mobile").value.trim();

if(mobile.length!=10){
alert("वैध मोबाईल नंबर टाका");
return;
}

// मोबाईल नंबर तात्पुरता सेव्ह
localStorage.setItem("mobile",mobile);

// पुढील Call Verification पेज
window.location.href="call-verification.html";

}

</script>

</body>
</html>
