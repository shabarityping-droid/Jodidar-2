<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    text-align:center;
}
.container{
    width:320px;
    margin:40px auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px #ccc;
}
input{
    width:90%;
    padding:10px;
    margin:8px 0;
}
button{
    width:95%;
    padding:10px;
    background:#007bff;
    color:white;
    border:none;
    cursor:pointer;
}
button:hover{
    background:#0056b3;
}
</style>
</head>

<body>

<div class="container">
<h2>लॉगिन</h2>

<input type="text" id="mobile" placeholder="मोबाईल नंबर">

<button onclick="login()">लॉगिन</button>

<p id="msg"></p>

</div>

<script>
function login(){

let mobile = document.getElementById("mobile").value.trim();

let users = JSON.parse(localStorage.getItem("users")) || [];

let user = users.find(u => u.mobile === mobile);

if(user){
    localStorage.setItem("currentUser", JSON.stringify(user));
    document.getElementById("msg").innerHTML = "लॉगिन यशस्वी!";
    
    setTimeout(function(){
        window.location.href = "home.html";
    },1000);

}else{
    document.getElementById("msg").innerHTML = "मोबाईल नंबर सापडला नाही.";
}
}
</script>

</body>
</html>
