<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jodidar - Login</title>

<link rel="stylesheet" href="style.css">

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f2f2f2;
}
.container{
    width:90%;
    max-width:350px;
    margin:70px auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}
h2{
    text-align:center;
    color:#e91e63;
}
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:16px;
    box-sizing:border-box;
}
button{
    width:100%;
    padding:12px;
    background:#e91e63;
    color:#fff;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}
button:hover{
    background:#c2185b;
}
a{
    display:block;
    text-align:center;
    margin-top:15px;
    text-decoration:none;
    color:#2196f3;
}
</style>

</head>
<body>

<div class="container">

<h2>Login</h2>

<input
type="tel"
id="mobile"
placeholder="मोबाईल नंबर"
maxlength="10">

<button onclick="loginUser()">Login</button>

<a href="register.html">नवीन नोंदणी करा</a>

</div>

<script>

function loginUser(){

let mobile=document.getElementById("mobile").value.trim();

if(mobile.length!=10){
alert("योग्य 10 अंकी मोबाईल नंबर टाका.");
return;
}

let users=JSON.parse(localStorage.getItem("users"))||[];

let found=users.find(user=>user.mobile===mobile);

if(found){

localStorage.setItem("currentUser",JSON.stringify(found));

window.location.href="home.html";

}else{

alert("हा मोबाईल नंबर नोंदणीकृत नाही.");

}

}

</script>

</body>
</html>
