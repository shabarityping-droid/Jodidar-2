<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jodidar - Login</title>

    <link rel="stylesheet" href="style.css">

    <!-- Firebase SDK -->
    <script type="module" src="firebase.js"></script>
</head>

<body>

<div class="container">

    <h2>🔐 Login</h2>

    <form id="loginForm">

        <input
            type="email"
            id="email"
            placeholder="Email"
            required
        >

        <input
            type="password"
            id="password"
            placeholder="Password"
            required
        >

        <button type="submit">
            Login
        </button>

    </form>

    <br>

    <p>
        नवीन खाते नाही?
        <a href="register.html">Register</a>
    </p>

    <p id="message"></p>

</div>

<script type="module" src="login.js"></script>

</body>
</html>
