
<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Jodidar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>❤️ Jodidar</h1>
</header>

<main>
    <h2>Login</h2>

    <form id="loginForm">
        <input type="email" id="email" placeholder="ईमेल" required><br><br>

        <input type="password" id="password" placeholder="पासवर्ड" required><br><br>

        <button type="submit">Login</button>
    </form>

    <br>

    <p>खाते नाही?
        <a href="register.html">Register</a>
    </p>
</main>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();

    localStorage.setItem("loggedIn", "true");
    alert("यशस्वीरित्या Login झाले.");

    window.location.href = "profile.html";
});
</script>

</body>
</html>
