<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jodidar Login</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:0;
}

.container{
    width:90%;
    max-width:400px;
    margin:50px auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    color:#d81b60;
}

input{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    margin-top:20px;
    background:#d81b60;
    color:#fff;
    border:none;
    border-radius:5px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#ad1457;
}

p{
    text-align:center;
    margin-top:20px;
}

a{
    text-decoration:none;
    color:blue;
}
</style>

</head>

<body>

<div class="container">

<h2>💖 Jodidar Login</h2>

<input type="text"
id="customerId"
placeholder="Customer ID">

<input type="text"
id="mobile"
placeholder="Mobile Number">

<button onclick="loginUser()">Login</button>

<p>
New User?
<a href="register.html">Register Here</a>
</p>

</div>

<script>

function loginUser(){

let customerId=document.getElementById("customerId").value.trim();

let mobile=document.getElementById("mobile").value.trim();

if(customerId=="" || mobile==""){
alert("Customer ID आणि Mobile Number भरा.");
return;
}

// पुढे Firebase तपासणी login.js मध्ये केली जाईल

alert("Login Successful");

window.location.href="home.html";

}

</script>

</body>
</html>
