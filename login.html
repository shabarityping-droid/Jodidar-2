<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Jodidar</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f2f2f2;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .box{
            width:90%;
            max-width:350px;
            background:#fff;
            padding:20px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,.2);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:5px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:12px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#0056b3;
        }

        p{
            text-align:center;
            margin-top:15px;
        }

        a{
            text-decoration:none;
            color:blue;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>Jodidar Login</h2>

    <form id="loginForm">

        <input
            type="tel"
            id="mobile"
            placeholder="मोबाईल नंबर"
            maxlength="10"
            required
        >

        <button type="submit">
            Login
        </button>

    </form>

    <p>
        खाते नाही?
        <a href="register.html">नोंदणी करा</a>
    </p>

</div>

<script type="module" src="login.js"></script>

</body>
</html>
