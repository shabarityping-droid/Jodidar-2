<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jodidar - Admin Panel</title>

<link rel="stylesheet" href="style.css">

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f2f2f2;
}

header{
    background:#e91e63;
    color:#fff;
    padding:15px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

.container{
    width:95%;
    max-width:900px;
    margin:20px auto;
}

.card{
    background:#fff;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

button{
    background:#e91e63;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:5px;
    cursor:pointer;
    margin:5px;
}

button:hover{
    background:#c2185b;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}

table th,table td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}

table th{
    background:#e91e63;
    color:white;
}
</style>

</head>
<body>

<header>
Jodidar Admin Panel
</header>

<div class="container">

<div class="card">
<h2>Dashboard</h2>

<p><b>Total Users:</b> <span id="totalUsers">0</span></p>
<p><b>Pending Requests:</b> <span id="pending">0</span></p>
<p><b>Approved Profiles:</b> <span id="approved">0</span></p>

<button onclick="refreshData()">Refresh</button>
</div>

<div class="card">
<h2>User List</h2>

<table>
<thead>
<tr>
<th>Name</th>
<th>Mobile</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="userTable">
<tr>
<td colspan="4">No Users Found</td>
</tr>
</tbody>

</table>

</div>

</div>

<script>
function refreshData(){
    alert("Data Refresh Successfully");
}
</script>

</body>
</html>
